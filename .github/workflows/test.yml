name: Run Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 15

    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome,firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn clean test -Dbrowser=${{ matrix.browser }}

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: Test-Reports
          path: target/